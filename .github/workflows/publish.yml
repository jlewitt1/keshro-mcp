name: Publish MCP

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy to production or staging"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload to Keshro API
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
          API_URL: ${{ inputs.environment == 'production' && 'https://api.keshro.com' || 'http://localhost:8000' }}
        run: |
          PACKAGE=$(ls dist/keshro_mcp-*.tar.gz)
          echo "Uploading $PACKAGE to $API_URL..."
          HTTP_CODE=$(curl -fsSL -w "%{http_code}" \
            -X PUT \
            -H "X-Deploy-Secret: $DEPLOY_SECRET" \
            -F "file=@$PACKAGE" \
            "$API_URL/v1/mcp/upload" \
            -o /tmp/upload-response.json)
          cat /tmp/upload-response.json
          echo ""
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Upload failed (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Published successfully."
