name: Publish MCP

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional package version to publish. Defaults to pyproject.toml.
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for PyPI trusted publishing
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Resolve version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import os
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          pyproject_version = str(data["project"]["version"]).strip()
          requested_version = str(os.environ.get("INPUT_VERSION") or "").strip()

          if requested_version and requested_version != pyproject_version:
              raise SystemExit(
                  f"Input version {requested_version!r} does not match pyproject version {pyproject_version!r}."
              )

          print(f"PACKAGE_VERSION={pyproject_version}")
          print(f"RELEASE_TAG=v{pyproject_version}")
          PY

      - name: Ensure release tag does not already exist
        run: |
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists."
            exit 1
          fi

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Push MCP version to Keshro backend
        continue-on-error: true
        env:
          KESHRO_API_URL: ${{ vars.KESHRO_API_URL || 'https://api.keshro.com' }}
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_SECRET:-}" ]; then
            echo "DEPLOY_SECRET not set - skipping MCP version upload."
            exit 0
          fi
          python - > mcp-version.json <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          payload = {
              "mcp_version": os.environ["PACKAGE_VERSION"],
              "generated_at": datetime.now(timezone.utc).isoformat(),
          }
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY
          curl --fail --show-error --silent \
            -X PATCH \
            -H "X-Deploy-Secret: ${DEPLOY_SECRET}" \
            -H "Content-Type: application/json" \
            --data @mcp-version.json \
            "${KESHRO_API_URL}/api/v1/cli/options/upload"
          echo "Uploaded MCP version to ${KESHRO_API_URL}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --target "${GITHUB_SHA}" \
            --generate-notes
